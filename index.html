<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리 아이 맞춤 책 추천 | 그레이트북스</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ── 그레이트북스 브랜드 변수 ── */
:root{
  --gb-deep:#7A2820;        /* 헤더·강조 딥 브릭 */
  --gb-red:#B5453A;         /* 메인 테라코타 레드 */
  --gb-mid:#C96B5E;         /* 중간 톤 */
  --gb-light:#F5E9E7;       /* 연한 레드 배경 */
  --gb-pale:#FBF5F4;        /* 아주 연한 배경 */
  --gb-border:#E8C0BB;      /* 레드 보더 */
  --warm-bg:#FAF7F5;        /* 페이지 크림 배경 */
  --warm-card:#FFFFFF;      /* 카드 흰색 */
  --warm-border:#EAE2DE;    /* 중립 보더 */
  --text-dark:#1E1A19;      /* 본문 다크 */
  --text-mid:#5A4E4B;       /* 중간 텍스트 */
  --text-light:#9A8E8B;     /* 흐린 텍스트 */
  --shadow-sm:0 2px 8px rgba(122,40,32,.06);
  --shadow-md:0 4px 16px rgba(122,40,32,.10);
}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--warm-bg);color:var(--text-dark);min-height:100vh;display:flex;justify-content:center;padding:0 0 80px}
#app{width:100%;max-width:560px}

/* ── 상단 헤더 ── */
.gb-header{background:var(--gb-deep);padding:13px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
.gb-logo-txt{color:rgba(255,255,255,.88);font-size:11px;font-weight:700;letter-spacing:.06em}
.gb-header-divider{width:1px;height:14px;background:rgba(255,255,255,.25)}

/* ── 콘텐츠 ── */
.gb-content{padding:22px 18px}

/* ── 프로그레스 ── */
.pw{display:flex;align-items:center;gap:10px;margin-bottom:22px}
.bk{background:none;border:none;cursor:pointer;color:var(--text-light);font-size:13px;font-family:inherit;padding:4px 0;display:flex;align-items:center;gap:4px;flex-shrink:0;transition:color .15s}
.bk:hover{color:var(--gb-red)}
.bk svg{width:15px;height:15px}
.pb{flex:1;height:3px;background:var(--warm-border);border-radius:2px;overflow:hidden}
.pf{height:100%;border-radius:2px;transition:width .4s ease}
.pf.pc{background:var(--gb-red)}
.pf.pb2{background:var(--gb-mid)}
.pf.pm{background:var(--gb-deep)}

/* ── 스텝 태그 ── */
.stag{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.sd{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.stag.tc .sd{background:var(--gb-red)}.stag.tc{color:var(--gb-red)}
.stag.tb .sd{background:var(--gb-mid)}.stag.tb{color:var(--gb-mid)}
.stag.tm .sd{background:var(--gb-deep)}.stag.tm{color:var(--gb-deep)}

.sq{font-size:19px;font-weight:700;color:var(--text-dark);line-height:1.45;margin-bottom:7px}
.sh{font-size:13px;color:var(--text-mid);line-height:1.65;margin-bottom:18px}

/* ── 발달 이정표 ── */
.dev-card{background:#FBF5F4;border:1px solid var(--gb-border);border-radius:12px;padding:12px 15px;margin-bottom:18px}
.dev-title{font-size:10px;font-weight:700;color:var(--gb-deep);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px;display:flex;align-items:center;gap:5px}
.dev-title svg{width:12px;height:12px}
.dev-items{display:flex;flex-direction:column;gap:5px}
.dev-item{font-size:12px;color:#6B2E26;line-height:1.5;display:flex;align-items:baseline;gap:7px}
.dev-item::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--gb-red);flex-shrink:0;margin-top:5px}

/* ── 배너 ── */
.ban{border-radius:12px;padding:12px 15px;margin-bottom:16px;display:flex;align-items:flex-start;gap:10px;border:1px solid var(--gb-border);background:#FBF5F4}
.bni{width:28px;height:28px;border-radius:50%;background:#F5E9E7;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.bni svg{width:13px;height:13px}
.bnt{font-size:12px;line-height:1.6;color:#5A2E2A}
.bnt strong{font-weight:700;color:var(--gb-deep)}

/* ── 옵션 카드 ── */
.og{display:grid;gap:9px;margin-bottom:22px}
.og.g2{grid-template-columns:1fr 1fr}
.og.g1{grid-template-columns:1fr}
.oc{background:var(--warm-card);border:1.5px solid var(--warm-border);border-radius:14px;padding:14px 15px;cursor:pointer;text-align:left;transition:border-color .18s,background .18s,box-shadow .18s;box-shadow:var(--shadow-sm)}
.oc:hover.hc,.oc:hover.hb,.oc:hover.hm{border-color:var(--gb-red);background:#FBF5F4;box-shadow:var(--shadow-md)}
.oc.sp2{grid-column:1/-1}
.obs{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;margin-bottom:6px;letter-spacing:.03em;color:var(--gb-deep);background:#F5E9E7}
.ot{font-size:13px;font-weight:700;color:var(--text-dark);margin-bottom:4px;line-height:1.35}
.os2{font-size:12px;color:var(--text-mid);line-height:1.5}

/* ── 웰컴 히어로 ── */
.ww{padding:4px 0 0}
.w-hero{background:var(--gb-deep);border-radius:16px;padding:26px 22px 22px;margin-bottom:22px;position:relative;overflow:hidden}
.w-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,.05)}
.w-hero::after{content:'';position:absolute;bottom:-20px;left:-20px;width:90px;height:90px;border-radius:50%;background:rgba(255,255,255,.04)}
.w-eyebrow{font-size:10px;font-weight:700;color:rgba(255,255,255,.6);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
.w-title{font-size:24px;font-weight:700;color:#fff;line-height:1.38;margin-bottom:10px}
.w-title em{color:#F5B8B0;font-style:normal}
.w-sub{font-size:13px;color:rgba(255,255,255,.68);line-height:1.65}

/* 스텝 인디케이터 */
.si-row{display:flex;align-items:flex-start;gap:0;margin-bottom:20px;padding:0 4px}
.si-item{display:flex;flex-direction:column;align-items:center;flex:1;position:relative}
.si-item:not(:last-child)::after{content:'';position:absolute;top:11px;left:50%;width:100%;height:2px;background:var(--warm-border);z-index:0}
.si-c{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;position:relative;z-index:1;margin-bottom:4px}
.si-c.cc{background:#F5E9E7;color:var(--gb-deep)}
.si-c.cb{background:#F0D8D5;color:#7A2820}
.si-c.cm{background:var(--gb-deep);color:#fff}
.si-l{font-size:9px;color:var(--text-light);text-align:center;line-height:1.3;white-space:nowrap}

/* 피처 박스 */
.fbox{background:var(--warm-card);border:1px solid var(--warm-border);border-radius:14px;padding:3px 0;margin-bottom:20px;box-shadow:var(--shadow-sm)}
.fr{display:flex;align-items:flex-start;gap:11px;padding:11px 15px}
.fr:not(:last-child){border-bottom:1px solid #F0E8E5}
.fi{width:24px;height:24px;border-radius:50%;background:#F5E9E7;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.fi svg{width:12px;height:12px}
.ft{font-size:13px;color:var(--text-mid);line-height:1.5}
.ft strong{font-weight:700;color:var(--text-dark)}

/* 시작 버튼 */
.btn-go{display:block;width:100%;background:var(--gb-red);color:#FFF;border:none;border-radius:12px;padding:16px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;text-align:center;transition:background .18s,box-shadow .18s;box-shadow:0 4px 14px rgba(181,69,58,.28);letter-spacing:.02em}
.btn-go:hover{background:var(--gb-deep);box-shadow:0 6px 18px rgba(122,40,32,.30)}

/* ── 결과 ── */
.rh{text-align:center;padding:16px 0 20px}
.rck{width:52px;height:52px;background:#F5E9E7;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;box-shadow:0 4px 12px rgba(181,69,58,.18)}
.rck svg{width:26px;height:26px}
.rt{font-size:19px;font-weight:700;color:var(--text-dark);margin-bottom:5px}
.rs{font-size:13px;color:var(--text-mid);line-height:1.65;padding:0 8px}
.mp{display:inline-block;font-size:11px;font-weight:700;padding:4px 13px;border-radius:20px;margin-top:9px;letter-spacing:.03em}
.mp.hit{background:#F5E9E7;color:var(--gb-deep)}
.mp.ok{background:#F5EDE9;color:#6B3028}

/* 보완 박스 */
.comp-box{background:#FBF5F4;border:1px solid var(--gb-border);border-radius:11px;padding:11px 14px;margin-bottom:14px;display:flex;gap:9px;align-items:flex-start}
.comp-icon{font-size:14px;flex-shrink:0;margin-top:1px}
.comp-txt{font-size:12px;color:#5A2E2A;line-height:1.6}
.comp-txt strong{font-weight:700;color:var(--gb-deep)}

/* 소셜 프루프 */
.sp-box{background:#FAF6F5;border-left:3px solid var(--gb-red);border-radius:0 9px 9px 0;padding:10px 14px;margin-bottom:12px}
.sp-q{font-size:13px;color:var(--text-dark);line-height:1.6;font-style:italic}
.sp-q::before{content:'"';color:var(--gb-red);font-weight:700;font-style:normal;font-size:16px}
.sp-q::after{content:'"';color:var(--gb-red);font-weight:700;font-style:normal;font-size:16px}
.sp-src{font-size:11px;color:var(--text-light);margin-top:4px}

/* 제품 카드 */
.pc{background:var(--warm-card);border:1.5px solid var(--warm-border);border-radius:16px;padding:18px;margin-bottom:10px;box-shadow:var(--shadow-sm)}
.pc.prime{border-color:var(--gb-red);box-shadow:0 4px 16px rgba(181,69,58,.12)}
.bdr{margin-bottom:9px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.bdp{font-size:11px;font-weight:700;color:var(--gb-deep);background:#F5E9E7;padding:3px 10px;border-radius:20px}
.bda{font-size:11px;font-weight:700;color:#4A5568;background:#EDF2F7;padding:3px 10px;border-radius:20px}
.pnm{font-size:18px;font-weight:700;color:var(--text-dark);margin-bottom:2px}
.ptg{font-size:12px;color:var(--text-mid);margin-bottom:10px}
.pm{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:13px}
.mt{font-size:11px;color:var(--text-mid);background:#F0EAE7;padding:2px 9px;border-radius:20px}
.mt.sp2{color:var(--gb-deep);background:#F5E9E7}

/* 발달 연결점 */
.dev-result{background:#FBF5F4;border-radius:10px;padding:11px 14px;margin-bottom:13px;border:1px solid var(--gb-border)}
.dev-rt{font-size:10px;font-weight:700;color:var(--gb-deep);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.dev-ritem{font-size:12px;color:#6B2E26;line-height:1.55;padding-left:12px;position:relative;margin-bottom:3px}
.dev-ritem::before{content:'→';position:absolute;left:0;color:var(--gb-red);font-size:11px;top:1px}

.wb2{border-left:3px solid var(--gb-border);padding-left:13px;margin-bottom:15px}
.wl{font-size:10px;font-weight:700;color:var(--gb-red);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.wt2{font-size:13px;color:var(--text-mid);line-height:1.65}

/* 제품 링크 버튼 */
.bv{display:block;width:100%;background:var(--gb-deep);color:#FFF;border:none;border-radius:10px;padding:13px;font-family:inherit;font-size:14px;font-weight:700;text-align:center;text-decoration:none;transition:background .18s;letter-spacing:.02em}
.bv:hover{background:#5C1D16}

/* 다시하기 버튼 */
.br2{display:block;width:100%;background:transparent;color:var(--text-mid);border:1.5px solid var(--warm-border);border-radius:10px;padding:12px;font-family:inherit;font-size:13px;cursor:pointer;text-align:center;margin-top:8px;transition:background .15s,border-color .15s}
.br2:hover{background:#FBF5F4;border-color:var(--gb-border)}
.bundle-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:11px}
.bundle-lbl{font-size:11px;color:var(--text-light);flex-shrink:0}
.bundle-tag{font-size:11px;color:var(--gb-deep);background:#F5E9E7;padding:2px 9px;border-radius:20px;font-weight:500}

/* ── 기질 보완 카드 ── */
.pc.temp-card{border-color:var(--gb-mid);background:#FBF5F4}
.bdt{font-size:11px;font-weight:700;color:var(--gb-mid);background:#F5E9E7;padding:3px 10px;border-radius:20px}
.temp-why{background:#FAF0EE;border-left:3px solid var(--gb-mid);border-radius:0 9px 9px 0;padding:10px 14px;margin-bottom:12px;font-size:13px;color:var(--text-mid);line-height:1.6}
.rw{margin-top:22px}
.dv{text-align:center;font-size:12px;color:var(--text-light);margin:6px 0 3px;display:flex;align-items:center;gap:8px}
.dv::before,.dv::after{content:'';flex:1;height:1px;background:var(--warm-border)}

/* ── 상담 CTA ── */
.cta-wrap{margin-top:26px;padding:22px 20px;background:var(--gb-deep);border-radius:16px;text-align:center;position:relative;overflow:hidden}
.cta-wrap::before{content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.05)}
.cta-label{font-size:11px;font-weight:700;color:rgba(255,255,255,.65);letter-spacing:.07em;text-transform:uppercase;margin-bottom:8px}
.cta-desc{font-size:13px;color:rgba(255,255,255,.82);line-height:1.65;margin-bottom:16px}
.cta-btn{display:block;width:100%;background:#fff;color:var(--gb-deep);border:none;border-radius:10px;padding:15px;font-family:inherit;font-size:15px;font-weight:700;text-align:center;text-decoration:none;cursor:pointer;transition:background .18s;letter-spacing:.02em}
.cta-btn:hover{background:#FBF5F4}

.si-item{display:flex;flex-direction:column;align-items:center;flex:1;position:relative}
.si-item:not(:last-child)::after{content:'';position:absolute;top:11px;left:50%;width:100%;height:2px;background:var(--warm-border);z-index:0}
.si-c{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;position:relative;z-index:1;margin-bottom:4px}
.si-c.cc{background:#F5E9E7;color:#7A2820}
.si-c.cb{background:#D9F2E8;color:#085041}
.si-c.cm{background:#7A2820;color:#fff}
.si-l{font-size:9px;color:var(--text-light);text-align:center;line-height:1.3;white-space:nowrap}

/* CTA 시작 버튼 */
.btn-go{display:block;width:100%;background:#B5453A;color:#FFF;border:none;border-radius:12px;padding:16px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;text-align:center;transition:background .18s,box-shadow .18s;box-shadow:0 4px 14px rgba(181,69,58,.28)}
.btn-go:hover{background:#7A2820;box-shadow:0 6px 18px rgba(122,40,32,.30)}

/* ── 결과 화면 ── */
.rh{text-align:center;padding:16px 0 20px}
.rck{width:52px;height:52px;background:#F5E9E7;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;box-shadow:0 4px 12px rgba(181,69,58,.2)}
.rck svg{width:26px;height:26px}
.rt{font-size:19px;font-weight:700;color:var(--text-dark);margin-bottom:5px}
.rs{font-size:13px;color:var(--text-mid);line-height:1.65;padding:0 8px}
.mp{display:inline-block;font-size:11px;font-weight:700;padding:4px 13px;border-radius:20px;margin-top:9px;letter-spacing:.03em}
.mp.hit{background:#F5E9E7;color:#7A2820}
.mp.ok{background:#FFF3E0;color:#7A4000}

/* 보완 박스 */
.comp-box{background:#FBF5F4;border:1px solid var(--gb-border);border-radius:11px;padding:11px 14px;margin-bottom:14px;display:flex;gap:9px;align-items:flex-start}
.comp-icon{font-size:14px;flex-shrink:0;margin-top:1px}
.comp-txt{font-size:12px;color:#1A5C40;line-height:1.55}
.comp-txt strong{font-weight:700;color:#7A2820}

/* 소셜 프루프 */
.sp-box{background:#FAF8F5;border-left:3px solid #B5453A;border-radius:0 9px 9px 0;padding:10px 14px;margin-bottom:12px}
.sp-q{font-size:13px;color:var(--text-dark);line-height:1.6;font-style:italic}
.sp-q::before{content:'"';color:#B5453A;font-weight:700;font-style:normal;font-size:16px;line-height:1}
.sp-q::after{content:'"';color:#B5453A;font-weight:700;font-style:normal;font-size:16px;line-height:1}
.sp-src{font-size:11px;color:var(--text-light);margin-top:4px}

/* 제품 카드 */
.pc{background:var(--warm-card);border:1.5px solid var(--warm-border);border-radius:16px;padding:18px;margin-bottom:10px;box-shadow:var(--shadow-sm);transition:box-shadow .18s}
.pc.prime{border-color:#B5453A;box-shadow:0 4px 16px rgba(181,69,58,.14)}
.bdr{margin-bottom:9px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.bdp{font-size:11px;font-weight:700;color:#7A2820;background:#F5E9E7;padding:3px 10px;border-radius:20px}
.bda{font-size:11px;font-weight:700;color:#4A5568;background:#EDF2F7;padding:3px 10px;border-radius:20px}
.pnm{font-size:18px;font-weight:700;color:var(--text-dark);margin-bottom:2px}
.ptg{font-size:12px;color:var(--text-mid);margin-bottom:10px}
.pm{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:13px}
.mt{font-size:11px;color:var(--text-mid);background:var(--warm-border);padding:2px 9px;border-radius:20px}
.mt.sp2{color:#7A2820;background:#F5E9E7}

/* 발달 연결점 */
.dev-result{background:#FBF5F4;border-radius:10px;padding:11px 14px;margin-bottom:13px;border:1px solid var(--gb-border)}
.dev-rt{font-size:10px;font-weight:700;color:#7A2820;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.dev-ritem{font-size:12px;color:#1A5C40;line-height:1.5;padding-left:12px;position:relative;margin-bottom:3px}
.dev-ritem::before{content:'→';position:absolute;left:0;color:#B5453A;font-size:11px;top:1px}

.wb2{border-left:3px solid var(--gb-border);padding-left:13px;margin-bottom:15px}
.wl{font-size:10px;font-weight:700;color:#B5453A;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.wt2{font-size:13px;color:var(--text-mid);line-height:1.65}

/* 제품 상세보기 버튼 */
.bv{display:block;width:100%;background:#7A2820;color:#FFF;border:none;border-radius:10px;padding:13px;font-family:inherit;font-size:14px;font-weight:700;text-align:center;text-decoration:none;transition:background .18s;letter-spacing:.02em}
.bv:hover{background:#073D27}

/* 다시하기 버튼 */
.br2{display:block;width:100%;background:transparent;color:var(--text-mid);border:1.5px solid var(--warm-border);border-radius:10px;padding:12px;font-family:inherit;font-size:13px;cursor:pointer;text-align:center;margin-top:8px;transition:background .15s,border-color .15s}
.br2:hover{background:#FBF5F4;border-color:var(--gb-border)}
.bundle-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:11px}
.bundle-lbl{font-size:11px;color:var(--text-light);flex-shrink:0}
.bundle-tag{font-size:11px;color:var(--gb-deep);background:#F5E9E7;padding:2px 9px;border-radius:20px;font-weight:500}

/* ── 기질 보완 카드 ── */
.pc.temp-card{border-color:var(--gb-mid);background:#FBF5F4}
.bdt{font-size:11px;font-weight:700;color:var(--gb-mid);background:#F5E9E7;padding:3px 10px;border-radius:20px}
.temp-why{background:#FAF0EE;border-left:3px solid var(--gb-mid);border-radius:0 9px 9px 0;padding:10px 14px;margin-bottom:12px;font-size:13px;color:var(--text-mid);line-height:1.6}
.rw{margin-top:22px}
.dv{text-align:center;font-size:12px;color:var(--text-light);margin:6px 0 3px;display:flex;align-items:center;gap:8px}
.dv::before,.dv::after{content:'';flex:1;height:1px;background:var(--warm-border)}

/* ── CTA 상담 버튼 ── */
.cta-wrap{margin-top:26px;padding:22px 20px;background:#7A2820;border-radius:16px;text-align:center;position:relative;overflow:hidden}
.cta-wrap::before{content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.05)}
.cta-label{font-size:12px;font-weight:700;color:rgba(255,255,255,.7);letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px}
.cta-desc{font-size:13px;color:rgba(255,255,255,.85);line-height:1.65;margin-bottom:16px}
.cta-btn{display:block;width:100%;background:#fff;color:#7A2820;border:none;border-radius:10px;padding:15px;font-family:inherit;font-size:15px;font-weight:700;text-align:center;text-decoration:none;cursor:pointer;transition:background .18s,color .18s;letter-spacing:.02em}
.cta-btn:hover{background:#F5E9E7;color:#7A2820}
</style>

function computeRec(cands,momGoal,tempType,readStyle,ownKey){
  const own=OWN_COMP[ownKey]||OWN_COMP.none;
  let pool=cands.filter(p=>!own.skip.includes(p));
  // fallback 개선: pool이 비면 OWN boost 제품 중 cands 아닌 것으로 대체
  if(pool.length===0){
    const altPool=[...own.boost].filter(p=>P[p]&&!own.skip.includes(p));
    pool=altPool.length>0?altPool:[...cands];
  }
  if(tempType!=='normal'&&TEMP_BOOST[tempType]){const b=TEMP_BOOST[tempType];pool.sort((a,b2)=>(b.has(b2)?1:0)-(b.has(a)?1:0))}
  if(own.boost.size>0)pool.sort((a,b)=>(own.boost.has(b)?1:0)-(own.boost.has(a)?1:0));
  if(readStyle==='saypen')pool.sort((a,b)=>(SAYPEN_SET.has(b)?1:0)-(SAYPEN_SET.has(a)?1:0));
  // 혼자 읽기: 이야기 구성이 탄탄해 아이 스스로 집중할 수 있는 제품 우선
  if(readStyle==='read_alone'){const ra=new Set(['mabeobsa','kkotha','sci_dragon','gogo','hist_dragon','social_dragon','math_dragon']);pool.sort((a,b)=>(ra.has(b)?1:0)-(ra.has(a)?1:0));}
  const gb=GOAL_BOOST_V6[momGoal];
  if(gb&&gb.size>0)pool.sort((a,b)=>(gb.has(b)?1:0)-(gb.has(a)?1:0));
  const ordered=pool.slice(0,2);
  const goalMsg={start:'월령에 꼭 맞는 발달 기반 추천이에요.',balance:'다양한 영역을 고르게 채워주는 추천이에요.',school:'초등 교과와 자연스럽게 연계되는 추천이에요.',habit:'아이가 스스로 꺼내 보는 독서 습관을 만들어주는 추천이에요.'};
  let msg=goalMsg[momGoal]||'아이 발달과 기질을 기반으로 선별했어요.';
  if(readStyle==='saypen'&&ordered.some(p=>P[p]?.saypen))msg+=' 세이펜을 지원해요.';
  if(readStyle==='together')msg+=' 엄마가 읽어주는 교감이 효과를 두 배로 만들어줘요.';
  if(readStyle==='read_alone')msg+=' 스스로 꺼내 읽고 싶어지는 이야기형 전집으로 독서 독립을 도와줘요.';
  const bonusCard=getTempCard(S.tempReviewKey||tempType,S.ageKey,ordered);
  return{pids:ordered,msg,matchType:'hit',compNote:own.note,tempType,bonusCard,ownSkip:own.skip};
}

const BRAIN_I=`<svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="5" stroke="#B5453A" stroke-width="1.5"/><path d="M8 5v3l2 1.5" stroke="#B5453A" stroke-width="1.5" stroke-linecap="round"/></svg>`;
const BOOK_I=`<svg viewBox="0 0 16 16" fill="none"><rect x="3" y="3" width="10" height="10" rx="1.5" stroke="#B5453A" stroke-width="1.5"/><line x1="8" y1="3" x2="8" y2="13" stroke="#B5453A" stroke-width="1.2"/></svg>`;
const USER_I=`<svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="6" r="2.5" stroke="#B5453A" stroke-width="1.5"/><path d="M3 13c0-2.8 2-4.5 5-4.5s5 1.7 5 4.5" stroke="#B5453A" stroke-width="1.5" stroke-linecap="round"/></svg>`;
const STAR_I=`<svg viewBox="0 0 12 12" fill="none"><path d="M6 1l1.2 3.6H11L8.4 6.8l1 3.2L6 8.2l-3.4 1.8 1-3.2L1 4.6h3.8z" stroke="#B5453A" stroke-width="1" fill="#F5E9E7"/></svg>`;

function bar(pct,tc='pc'){return`<div class="pw"><button class="bk" onclick="doBack()">${BACK_I}이전</button><div class="pb"><div class="pf ${tc}" style="width:${pct}%"></div></div></div>`}

function devCard(ageKey){
  const items=DEV_MAP[ageKey]||[];
  return`<div class="dev-card"><div class="dev-title">${STAR_I}이 시기 핵심 발달</div><div class="dev-items">${items.map(i=>`<div class="dev-item">${i}</div>`).join('')}</div></div>`;
}

function renderWelcome(){
  return`<div class="ww">
<div class="w-hero">
  <div class="w-eyebrow">그레이트북스 · 맞춤 추천</div>
  <div class="w-title">우리 아이에게<br><em>딱 맞는 책</em>을<br>찾아드릴게요</div>
  <div class="w-sub">6가지 기준으로 아이와 엄마 모두에게<br>맞는 전집을 추천해드려요</div>
</div>
<div class="si-row">
  <div class="si-item"><div class="si-c cc">1</div><div class="si-l">월령</div></div>
  <div class="si-item"><div class="si-c cc">2</div><div class="si-l">관심사</div></div>
  <div class="si-item"><div class="si-c cb">3</div><div class="si-l">기질</div></div>
  <div class="si-item"><div class="si-c cb">4</div><div class="si-l">보유전집</div></div>
  <div class="si-item"><div class="si-c cb">5</div><div class="si-l">독서환경</div></div>
  <div class="si-item"><div class="si-c cm">6</div><div class="si-l">목표</div></div>
</div>
<div class="fbox">
  <div class="fr"><div class="fi">${SMC('#B5453A')}</div><div class="ft"><strong>발달 단계 기반</strong> 월령 + 관심사 반영</div></div>
  <div class="fr"><div class="fi">${SMC('#C96B5E')}</div><div class="ft"><strong>실생활 밀착</strong> 기질 + 보유전집 + 독서환경</div></div>
  <div class="fr"><div class="fi">${SMC('#7A2820')}</div><div class="ft"><strong>엄마 목표</strong> 구매 목적에 딱 맞는 방향으로 정확하게</div></div>
</div>
<button class="btn-go" onclick="doStart()">지금 시작하기 →</button>
</div>`;
}

function renderAge(){
  curOpts=AGE_STEP.opts;const n=curOpts.length;
  const cards=curOpts.map((o,i)=>{const sp=i===n-1&&n%2!==0?' sp2':'';return`<div class="oc hc${sp}" onclick="doAge(${i})"><div class="ot">${o.t}</div><div class="os2">${o.s}</div></div>`;}).join('');
  return`${bar(AGE_STEP.pct,'pc')}<div class="stag tc"><div class="sd"></div>STEP 1 — 아이 월령</div><div class="sq">아이가 몇 개월이에요?</div><p class="sh">월령에 따라 발달 단계가 달라져요. 현재 기준으로 선택해 주세요.</p><div class="og g2">${cards}</div>`;
}

function renderInt(key){
  const s=INT[key];curOpts=s.opts;const n=s.opts.length;const cls=n>=5?' g1':' g2';
  const cards=s.opts.map((o,i)=>`<div class="oc hc" onclick="doInt(${i})"><div class="ot">${o.t}</div><div class="os2">${o.s}</div></div>`).join('');
  return`${bar(s.pct,'pc')}${devCard(S.ageKey)}<div class="stag tc"><div class="sd"></div>STEP 2 — 아이 관심사</div><div class="sq">요즘 아이가 가장 빠져있는 게 뭐예요?</div><p class="sh">관심 분야에 따라 아이가 빠져들 책이 달라져요.</p><div class="og${cls}">${cards}</div>`;
}

function renderTemp(){
  const descSet=TEMP_DESC[S.ageKey]||TEMP_DESC['25~36'];
  const keys=['sensitive','excitable','easygoing','refuse'];
  const cards=keys.map((k,i)=>{const d=descSet[k];return`<div class="oc hb" onclick="doTemp(${i})"><div class="ot">${d.t}</div><div class="os2">${d.s}</div></div>`;}).join('');
  return`${bar(42,'pb2')}
<div class="ban bb"><div class="bni nbb">${BRAIN_I}</div><div class="bnt bb"><strong>${S.ageKey}개월 아이</strong>도 기질에 따라 책 반응이 완전히 달라요. 지금 우리 아이와 가장 비슷한 걸 선택해 주세요.</div></div>
<div class="stag tb"><div class="sd"></div>STEP 3 — 아이 기질</div>
<div class="sq">아이 성향을 한 가지만 고른다면?</div>
<p class="sh">맘카페에서 가장 자주 등장하는 고민이에요. 기질에 따라 같은 책도 반응이 완전히 달라져요.</p>
<div class="og g1">${cards}</div>`;
}

function renderOwn(){
  const cards=OWN_Q.opts.map((o,i)=>`<div class="oc hb" onclick="doOwn(${i})"><div class="ot">${o.t}</div><div class="os2">${o.s}</div></div>`).join('');
  return`${bar(OWN_Q.pct,'pb2')}
<div class="ban bb"><div class="bni nbb">${BOOK_I}</div><div class="bnt bb"><strong>보유 전집 확인!</strong><br>이미 있는 전집과 겹치지 않도록 꼭 필요한 영역을 보완해 드려요.</div></div>
<div class="stag tb"><div class="sd"></div>STEP 4 — 보유 전집</div>
<div class="sq">이미 갖고 있는 전집 종류가 있나요?</div>
<p class="sh">"자연관찰 이미 있는데 뭐 살까?" — 맘카페 단골 고민을 여기서 해결해 드려요!</p>
<div class="og g1">${cards}</div>`;
}

function renderRead(){
  const extra=S.ageKey==='61~84'?[{t:'📚  혼자 읽기도 해요',s:'글밥 있는 책을 스스로 읽기 시작했어요. 혼자 집중해서 볼 수 있는 책이 필요해요.',val:'read_alone'}]:[];
  const allOpts=[...READ_Q.opts,...extra];
  const cards=allOpts.map(o=>`<div class="oc hb" onclick="doRead('${o.val}')"><div class="ot">${o.t}</div><div class="os2">${o.s}</div></div>`).join('');
  return`${bar(READ_Q.pct,'pb2')}
<div class="ban bb"><div class="bni nbb">${BOOK_I}</div><div class="bnt bb"><strong>독서 환경</strong>을 알려주세요.<br>실제 생활 방식에 맞는 책이 훨씬 잘 활용돼요.</div></div>
<div class="stag tb"><div class="sd"></div>STEP 5 — 독서 환경</div>
<div class="sq">평소 아이에게 책을 어떻게 읽어주세요?</div>
<p class="sh">솔직하게 선택해 주세요. 어느 쪽이든 잘 맞는 책이 있어요!</p>
<div class="og g1">${cards}</div>`;
}

function renderMom(){
  // '초등 입학 전 기초'는 61~84개월(만 5~6세)에만 유효한 고민
  const schoolOpt=S.ageKey==='61~84'?[{v:'school',t:'🏫 초등 입학 전 기초를 미리 다져두고 싶어요',s:'교과 연계 전집으로 입학 준비를 자연스럽게 시작하고 싶어요'}]:[];
  const allOpts=[
    {v:'start',  t:'📌 지금 이 시기에 꼭 맞는 것부터 탄탄하게', s:'발달 단계에 딱 맞는 전집으로 제대로 시작하고 싶어요'},
    {v:'balance',t:'⚖️ 다양한 영역을 고르게 채워주고 싶어요',   s:'언어·정서·과학 한쪽에 치우치지 않게 균형 있게 채워주세요'},
    ...schoolOpt,
    {v:'habit',  t:'📚 아이가 스스로 꺼내 보는 습관을 만들고 싶어요', s:'세이펜·음원으로 혼자도 잘 보는 이야기형 전집이 맞아요'}
  ];
  const cards=allOpts.map(o=>`<div class="oc hm" onclick="doMom('${o.v}')"><div class="ot">${o.t}</div><div class="os2">${o.s}</div></div>`).join('');
  return`${bar(MOM_Q.pct,'pm')}
<div class="ban bm"><div class="bni nbm">${USER_I}</div><div class="bnt bm"><strong>거의 다 됐어요!</strong> 마지막으로 한 가지만요.<br>같은 아이라도 엄마가 바라는 방향에 따라 딱 맞는 전집이 달라져요.</div></div>
<div class="stag tm"><div class="sd"></div>STEP 6 — 엄마가 바라는 것</div>
<div class="sq">이 전집에서 가장 바라는 게 뭐예요?</div>
<p class="sh">구매 목적에 따라 같은 아이라도 맞는 전집이 달라져요. 솔직하게 선택해 주세요.</p>
<div class="og g1">${cards}</div>`;
}

function renderRes(){
  const d=window.__res;if(!d)return'';
  const{pids,msg,compNote}=d;
  const reviewKey=S.tempReviewKey||S.tempType;
  const whyKeyMap={start:'story',balance:'info',school:'info',habit:'story'};
  const whyKey=whyKeyMap[S.momGoal]||'story';
  const goalLabel={start:'발달 맞춤 추천',balance:'균형 영역 추천',school:'초등 연계 추천',habit:'독서 습관 추천'};
  const compBanner=compNote?`<div class="comp-box"><div class="comp-icon">💡</div><div class="comp-txt"><strong>보완 추천 적용됨</strong><br>${compNote}</div></div>`:'';
  const cards=pids.map((pid,i)=>{
    const p=P[pid];if(!p)return'';
    const first=i===0;
    const spTag=p.saypen?`<span class="mt sp2">세이펜</span>`:'';
    const reviewTxt=p.review?.[reviewKey]||p.review?.easygoing||'';
    const devItems=DEVCONNECT_DB[pid]||(DEV_MAP[p.devAge]||[]).slice(0,2);
    const whyTxt=p.why[whyKey]||p.why.story;
    const bundlePids=(BUNDLE_DB[pid]||[]).filter(b=>P[b]&&!pids.includes(b)).slice(0,2);
    const bundleHtml=bundlePids.length?`<div class="bundle-row"><span class="bundle-lbl">함께 많이 구매</span>${bundlePids.map(b=>`<span class="bundle-tag">${P[b].name}</span>`).join('')}</div>`:'';
    return`<div class="pc${first?' prime':''}">
<div class="bdr">${first?'<span class="bdp">첫 번째 추천</span>':'<span class="bda">함께 보면 더 좋아요</span>'}</div>
<div class="pnm">${p.name}</div><div class="ptg">${p.tagline}</div>
<div class="pm"><span class="mt">${p.age}</span><span class="mt">${p.area}</span><span class="mt">${p.label}</span>${spTag}</div>
${bundleHtml}
${reviewTxt?`<div class="sp-box"><div class="sp-q">${reviewTxt}</div><div class="sp-src">${p.reviewSrc}</div></div>`:''}
${devItems.length?`<div class="dev-result"><div class="dev-rt">이 시기 발달 & 이 책의 연결점</div>${devItems.map(di=>`<div class="dev-ritem">${di}</div>`).join('')}</div>`:''}
<div class="wb2"><div class="wl">이 책을 추천하는 이유</div><div class="wt2">${whyTxt}</div></div>
<a class="bv" href="${p.url}" target="_blank" rel="noopener">제품 자세히 보기 →</a>
</div>`;
  }).join(pids.length>1?'<div class="dv">+ 함께 보면 좋아요</div>':'');

  // 기질 보완 카드
  let bonusHtml='';
  if(d.bonusCard){
    const bp=P[d.bonusCard.pid];
    const tLabel={'sensitive':'예민한 기질 맞춤','excitable':'활동적 기질 맞춤','refuse':'책 거부 극복 맞춤'};
    const tLbl=tLabel[S.tempReviewKey]||'기질 맞춤';
    const bSpTag=bp.saypen?`<span class="mt sp2">세이펜</span>`:'';
    const bDev=DEVCONNECT_DB[d.bonusCard.pid]||[];
    bonusHtml=`<div class="dv">+ 기질 맞춤 추가 추천</div><div class="pc temp-card">
<div class="bdr"><span class="bdt">🧠 ${tLbl}</span></div>
<div class="pnm">${bp.name}</div><div class="ptg">${bp.tagline}</div>
<div class="pm"><span class="mt">${bp.age}</span><span class="mt">${bp.area}</span>${bSpTag}</div>
<div class="temp-why">${d.bonusCard.r}</div>
${bDev.length?`<div class="dev-result"><div class="dev-rt">이 시기 발달 & 이 책의 연결점</div>${bDev.map(di=>`<div class="dev-ritem">${di}</div>`).join('')}</div>`:''}
<a class="bv" href="${bp.url}" target="_blank" rel="noopener">제품 자세히 보기 →</a>
</div>`;
  } else if(S.tempReviewKey==='easygoing'){
    bonusHtml=`<div class="comp-box"><div class="comp-icon">✨</div><div class="comp-txt"><strong>고르게 잘 흡수하는 기질이에요!</strong><br>어떤 책이든 거부 없이 잘 받아들이는 아이예요. 추천된 전집을 믿고 시작해 보세요.</div></div>`;
  }

  const CTA_URL='https://www.greatbooks.co.kr/consulting/request';
  return`<div class="rh"><div class="rck">${CHK}</div><div class="rt">6단계 맞춤 추천 완료!</div><div class="rs">${msg}</div><div><span class="mp hit">${goalLabel[S.momGoal]||'맞춤 추천'}</span></div></div>
${compBanner}${cards}${bonusHtml}
<div class="cta-wrap">
  <div class="cta-label">📞 전문가 상담이 필요하신가요?</div>
  <div class="cta-desc">추천 결과가 마음에 드셨다면, 그레이트북스 전문 상담사가 아이에게 딱 맞는 책을 직접 안내해 드려요.</div>
  <a class="cta-btn" href="${CTA_URL}" target="_blank" rel="noopener">더 자세한 상담받기 →</a>
</div>
<div class="rw"><button class="br2" onclick="doRestart()">← 처음부터 다시 해보기</button></div>`;
}

function render(){
  let h='';
  if(cur==='welcome')h=renderWelcome();
  else if(cur==='__res__')h=renderRes();
  else if(cur==='age')h=renderAge();
  else if(cur==='q_temp')h=renderTemp();
  else if(cur==='q_own')h=renderOwn();
  else if(cur==='q_read')h=renderRead();
  else if(cur==='q_mom')h=renderMom();
  else if(INT[cur])h=renderInt(cur);
  else h='<p style="color:#6B6B66;padding:20px">오류가 발생했어요.</p>';
  document.getElementById('app').innerHTML=h;
}
render();
</script>
</body>
</html>
